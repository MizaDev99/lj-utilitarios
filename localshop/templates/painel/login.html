{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Painel Admin</title>
    <link rel="stylesheet" href="{% static 'css/painel.css' %}">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1 class="login-titulo">🏪 LocalShop</h1>
                <p class="login-sub">Painel Administrativo</p>
            </div>

            {% if messages %}
            {% for msg in messages %}
            <div class="alert alert-error">{{ msg }}</div>
            {% endfor %}
            {% endif %}

            <form method="post" class="login-form">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">Usuário</label>
                    <input type="text" name="username" class="form-control" placeholder="admin" autofocus required>
                </div>
                <div class="form-group">
                    <label class="form-label">Senha</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-login">Entrar</button>
            </form>

            <div style="text-align:center; margin-top:16px;">
                <a href="{% url 'core:homepage' %}" style="color:#6B7280; font-size:14px;">← Voltar à loja</a>
            </div>
        </div>
    </div>
</body>
</html>
